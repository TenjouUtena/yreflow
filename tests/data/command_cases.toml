input = ">:shrugs"
expected_style = "ooc"

[[case]]
description = "ooc pose with :>"
input = ":>laughs"
expected_style = "ooc"

[[case]]
description = "ooc with >"
input = ">be right back"
expected_style = "ooc"

[[case]]
description = "ooc pose with prefix"
input = "ooc :nods"
expected_style = "ooc"

