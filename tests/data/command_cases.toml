# Command parsing test cases for detect_command_type.
# Each case specifies input text and expected style.

# --- Say ---
[[case]]
description = "say with prefix"
input = "say hello world"
expected_style = "say"

[[case]]
description = "say with double quote"
input = '"hello there'
expected_style = "say"

[[case]]
description = "say with left smart quote"
input = "\u201chello"
expected_style = "say"

[[case]]
description = "say with right smart quote"
input = "\u201dhello"
expected_style = "say"

# --- Pose ---
[[case]]
description = "pose with colon"
input = ":waves happily."
expected_style = "pose"

[[case]]
description = "pose with prefix"
input = "pose stretches."
expected_style = "pose"

# --- OOC ---
[[case]]
description = "ooc with prefix"
input = "ooc brb a moment"
expected_style = "ooc"

[[case]]
