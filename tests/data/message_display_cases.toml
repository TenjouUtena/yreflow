# Message display formatting test cases for format_line.
# Each case specifies style, sender, msg, and what the output should contain.

[[case]]
description = "say message"
style = "say"
sender = "Thorn"
msg = "Hello there"
target_name = ""
has_pose = false
is_ooc = false
timestamp = "13:22"
expected_contains = 'says, "Hello there"'

[[case]]
description = "pose message"
style = "pose"
sender = "Thorn"
msg = "waves happily."
target_name = ""
has_pose = false
is_ooc = false
timestamp = "13:22"
expected_contains = "Thorn"
expected_contains_2 = "waves happily."

[[case]]
description = "pose with elided space"
style = "pose"
sender = "Thorn"
msg = "'s tail wags."
target_name = ""
has_pose = false
is_ooc = false
timestamp = "13:22"
expected_not_contains = "Thorn[/bold cyan] 's"
expected_contains = "Thorn[/bold cyan]'s"

[[case]]
description = "ooc say"
style = "ooc"
sender = "Pip"
msg = "brb"
target_name = ""
has_pose = false
is_ooc = false
timestamp = "14:00"
expected_contains = "[OOC]"
expected_contains_2 = 'says, "brb"'

[[case]]
description = "ooc pose"
style = "ooc"
sender = "Pip"
msg = "shrugs"
target_name = ""
has_pose = true
is_ooc = false
timestamp = "14:00"
expected_contains = "[OOC]"
expected_not_contains = "says,"

[[case]]
description = "whisper plain"
style = "whisper"
sender = "Thorn"
msg = "hey there"
target_name = "Pip"
has_pose = false
is_ooc = false
timestamp = "14:30"
expected_contains = 'whispers, "hey there"'
expected_contains_2 = "whisper Pip"

[[case]]
description = "whisper pose"
style = "whisper"
